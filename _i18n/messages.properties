# Default (English) — backend message bundle
TITLE_TOO_SHORT=Title is too short. Minimum 5 characters required.
JUSTIFICATION_REQUIRED_FOR_HIGH_AMOUNT=Justification is mandatory for requests exceeding 1000.
AMOUNT_MUST_BE_POSITIVE=The total amount must be greater than zero.

NO_SUPPLIER_TO_VALIDATE=No supplier is assigned on any line item to validate.
SUPPLIER_BLOCKED=Supplier {0} is blocked in S/4HANA and cannot be used.
SUPPLIER_SAFE=Supplier {0} is cleared for processing.
SUPPLIER_NOT_FOUND=Supplier {0} does not exist in S/4HANA.
CLOUD_SDK_ERROR=Cloud SDK communication error.

AI_ITEMS_REQUIRED=Add line items to the request before generating an AI justification.
AI_GENERATION_ERROR=A problem occurred while generating text with AI.
AI_JUSTIFICATION_SUCCESS=Business justification generated successfully.

SUPPLIERS_FETCH_ERROR=Cannot fetch suppliers from the external system.
PRODUCT_FETCH_ERROR=Cannot fetch products from the external system.
