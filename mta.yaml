_schema-version: 3.3.0
ID: CAPMAP
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: CAPMAP-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: CAPMAP-auth
      - name: CAPMAP-db
      - name: CAPMAP-connectivity
      - name: CAPMAP-destination

  - name: CAPMAP-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: CAPMAP-db

  - name: CAPMAP-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: CAPMAP-auth
      - name: srv-api
      - name: CAPMAP-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: CAPMAPrequestsui
          artifacts:
            - CAPMAPrequestsui.zip
          target-path: app/

  - name: CAPMAPrequestsui
    type: html5
    path: app/requestsui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: CAPMAP
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: CAPMAP-auth
      - name: CAPMAP-destination
      - name: CAPMAP-html5-runtime
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

resources:
  - name: CAPMAP-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: CAPMAP-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'authentication-user (CAPMAP ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.authentication-user'
          - name: 'Viewer (CAPMAP ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Viewer'
          - name: 'RegionalManager (CAPMAP ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.RegionalManager'
          - name: 'userattributes (CAPMAP ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.userattributes'
    requires:
      - name: app-api
  - name: CAPMAP-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: CAPMAP-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
  - name: CAPMAP-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: CAPMAP-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: CAPMAP-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
